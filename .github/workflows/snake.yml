# ═══════════════════════════════════════════════════════════════
#  🐍  GitHub Contribution Snake Generator
#  Auto-generates an animated SVG of a snake eating your
#  contribution graph and publishes it to the `output` branch.
#  The README references it via:
#    https://raw.githubusercontent.com/amalkumar-ak/amalkumar-ak/output/github-contribution-grid-snake.svg
# ═══════════════════════════════════════════════════════════════

name: 🐍 Generate Contribution Snake

on:
  # Run every 12 hours
  schedule:
    - cron: "0 */12 * * *"

  # Allow manual runs from the Actions tab
  workflow_dispatch:

  # Also run whenever this workflow file is updated
  push:
    branches:
      - main
    paths:
      - .github/workflows/snake.yml

permissions:
  contents: write

jobs:
  generate:
    name: Generate & Deploy Snake SVGs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🐍 Generate contribution snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: 📦 Push generated SVGs to the `output` branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
